<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ album.name }} - Photo Gallery</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <a href="/" class="back-link">← Back to Gallery</a>
        <h1>{{ album.name }}</h1>
        <p>{{ album.photo_count }} photos</p>
    </header>
    <main>
        <div class="photo-grid" id="photo-grid"
             data-images='{{ album.photos | map(attribute="original") | list | tojson }}'>
            {% for photo in album.photos %}
            <div class="photo-item" onclick="openLightbox({{ loop.index0 }})">
                <img src="{{ photo.thumbnail }}" alt="{{ photo.original }}" loading="lazy">
            </div>
            {% endfor %}
        </div>
    </main>
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-prev" onclick="prevImage()">&#8249;</button>
        <button class="lightbox-next" onclick="nextImage()">&#8250;</button>
        <img src="" alt="" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
    <script src="/static/js/gallery.js"></script>
</body>
</html>
