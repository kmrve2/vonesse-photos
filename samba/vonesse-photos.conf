# Samba configuration for Vonesse Photos share
# This allows Frank to add photos from his Mac via SMB

[vonesse-photos]
   comment = Vonesse Family Photos
   path = /var/www/photos
   browseable = yes
   read only = no
   guest ok = no
   create mask = 0644
   directory mask = 0755
   force user = www-data
   valid users = frank