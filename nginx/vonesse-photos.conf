server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static files (CSS, JS, images)
    location /static/ {
        alias /var/www/vonesse-photos/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Thumbnails (generated on-the-fly)
    location /thumbnails/ {
        alias /var/www/vonesse-photos/thumbnails/;
        expires 7d;
        add_header Cache-Control "public";
        
        # Security: don't allow directory listing
        autoindex off;
    }

    # Photos (served from shared folder)
    location /photos/ {
        alias /var/www/photos/;
        expires 30d;
        add_header Cache-Control "public";
        
        # Security: don't allow directory listing
        autoindex off;
        
        # Limit large file uploads (if we add upload feature later)
        client_max_body_size 50M;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}